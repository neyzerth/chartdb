services:
  chartdb:
    image: ghcr.io/neyzerth/chartdb:latest
    build:
      context: .
      args:
        # Build arguments (optional, passed via --build-arg or .env file)
        # - VITE_OPENAI_API_KEY
        # - VITE_OPENAI_API_ENDPOINT
        # - VITE_LLM_MODEL_NAME
        - VITE_HIDE_CHARTDB_CLOUD=${VITE_HIDE_CHARTDB_CLOUD:-true}
        - VITE_DISABLE_ANALYTICS=${VITE_DISABLE_ANALYTICS:-true}
    ports:
      - "8082:80"
    restart: unless-stopped
    environment:
      # Optional: API key for OpenAI-powered SQL export
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      # Optional: custom inference endpoint (e.g. vLLM)
      # - OPENAI_API_ENDPOINT=${OPENAI_API_ENDPOINT}
      # Optional: LLM model name for custom endpoint
      # - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      # Optional: hide "ChartDB Cloud" branding
      - HIDE_CHARTDB_CLOUD=true
      # Optional: disable analytics
      - DISABLE_ANALYTICS=true
